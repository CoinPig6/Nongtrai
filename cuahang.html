<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nông Trại Heo Con - Cửa Hàng</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overflow-y: scroll;
      background-color: #ecfdf5;
      background-image: radial-gradient(#d1fae5 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="text-gray-800 font-sans pb-20 md:pb-0 min-h-screen flex flex-col">

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-gray-900/95 text-white px-5 py-2.5 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.25)] font-bold text-xs sm:text-sm flex items-center gap-2.5 border border-gray-700 opacity-0 pointer-events-none transition-all duration-300 translate-y-[-15px]">
    <i class="ph-fill ph-check-circle text-emerald-400 text-lg"></i>
    <span id="toast-msg">Thông báo</span>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-xl border-b border-gray-100 shadow-sm px-3 py-2.5 sm:px-4 sm:py-3">
    <div class="max-w-5xl mx-auto flex justify-between items-center gap-2">
      <!-- Logo -->
      <div class="flex items-center gap-1.5 text-emerald-800 font-black text-lg sm:text-2xl tracking-tight shrink-0">
        <div class="bg-gradient-to-br from-[#10b981] to-[#047857] text-white p-1 sm:p-1.5 rounded-lg shadow-sm border border-[#059669]">
          <i class="ph-fill ph-plant text-lg sm:text-xl"></i>
        </div>
        <span>Heo Con</span>
        <!-- Nhãn đồng bộ mây cực xịn -->
        <span id="cloud-indicator" class="w-2.5 h-2.5 rounded-full bg-gray-300 shadow-[0_0_8px_rgba(0,0,0,0.1)]" title="Đang đồng bộ..."></span>
      </div>
      
      <!-- Box Tiền Tệ -->
      <div class="flex items-center gap-2 shrink-0">
        <!-- Đồng Bạc -->
        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-full shadow-inner p-0.5 pl-2.5 pr-0.5 gap-1.5">
          <div class="flex items-center gap-1">
            <i class="ph-fill ph-coin text-gray-400 text-base sm:text-lg"></i>
            <span id="silver-display" class="text-xs sm:text-sm font-black text-gray-600">0</span>
          </div>
          <button onclick="topUpSilver()" class="bg-[#10b981] hover:bg-[#059669] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm transition-colors flex items-center gap-0.5 border border-emerald-600">
            <i class="ph-bold ph-plus"></i><span>Nạp</span>
          </button>
        </div>

        <!-- Đồng Vàng -->
        <div class="flex items-center gap-1 bg-gradient-to-r from-[#fef08a] to-[#fde047] px-2.5 py-1 rounded-full font-black text-[#854d0e] shadow-sm border border-[#facc15] text-xs sm:text-sm">
          <i class="ph-fill ph-coin text-[#ca8a04] text-base sm:text-lg animate-float"></i>
          <span id="gold-display">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="max-w-5xl mx-auto p-2 sm:p-4 md:py-8 flex flex-col md:flex-row gap-6 flex-1 w-full">
    
    <!-- Sidebar Desktop -->
    <div class="hidden md:flex flex-col gap-3 sticky top-24 h-fit w-64 shrink-0">
      <a href="index.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-plant text-2xl text-emerald-500"></i> Khu Vườn
      </a>
      <a href="cuahang.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-gradient-to-r from-emerald-500 to-green-500 text-white shadow-lg shadow-emerald-500/30 scale-[1.02]">
        <i class="ph-fill ph-storefront text-2xl"></i> Cửa Hàng
      </a>
      <a href="kho.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-backpack text-2xl text-orange-500"></i> Kho Nông Sản
      </a>
      <a href="tintuc.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-newspaper text-2xl text-indigo-500"></i> Bảng Tin
      </a>
      <div class="h-px bg-emerald-200/50 my-2"></div>
      <a href="taikhoan.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-user text-2xl text-gray-500"></i> Hồ Sơ
      </a>
    </div>

    <!-- Nội dung Tab Cửa hàng -->
    <div class="w-full flex-1 flex flex-col gap-4 animate-pop" id="shop-content">
      
      <!-- Banner Cửa Hàng -->
      <div class="bg-gradient-to-r from-[#10b981] to-[#047857] rounded-2xl p-5 text-white shadow-md relative overflow-hidden border border-emerald-600">
        <div class="relative z-10 max-w-md">
          <h2 class="text-xl sm:text-2xl font-black mb-1 flex items-center gap-2">
            <i class="ph-fill ph-storefront"></i> Hạt Giống Heo Con
          </h2>
          <p class="text-xs sm:text-sm text-emerald-100 font-medium">Sử dụng Đồng Bạc để mua những hạt giống chất lượng nhất cho khu vườn của bạn!</p>
        </div>
        <div class="absolute right-4 bottom-[-10px] opacity-10 pointer-events-none">
          <i class="ph ph-storefront text-[120px]"></i>
        </div>
      </div>

      <!-- Grid sản phẩm hạt giống -->
      <div id="shop-seeds-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Render mặc định từ JS -->
      </div>

    </div>
  </main>

  <!-- Bottom Nav Mobile -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-around items-end pb-safe z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] px-1 pt-1.5">
    <a href="index.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-emerald-500 transition-all">
      <i class="ph-fill ph-plant text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Vườn</span>
    </a>
    <a href="cuahang.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-emerald-600 transition-all">
      <div class="absolute inset-0 bg-emerald-50 rounded-xl -z-10 scale-95"></div>
      <i class="ph-fill ph-storefront text-2xl mb-0.5 -translate-y-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Cửa Hàng</span>
    </a>
    <a href="kho.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-orange-500 transition-all">
      <i class="ph-fill ph-backpack text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Kho</span>
    </a>
    <a href="tintuc.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-indigo-500 transition-all">
      <i class="ph-fill ph-newspaper text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Tin Tức</span>
    </a>
    <a href="taikhoan.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-gray-700 transition-all">
      <i class="ph-fill ph-user text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Hồ Sơ</span>
    </a>
  </nav>

  <!-- === LOGIC & FIREBASE === -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQa6awFxFTOrRXPnda8rS6vlKLKPDMJT0",
      authDomain: "nongtraiheocon.firebaseapp.com",
      databaseURL: "https://nongtraiheocon-default-rtdb.firebaseio.com",
      projectId: "nongtraiheocon",
      storageBucket: "nongtraiheocon.firebasestorage.app",
      messagingSenderId: "964519162656",
      appId: "1:964519162656:web:27247ed6287dfc74ef5d45",
      measurementId: "G-RT8HPTJERF"
    };

    let app, auth, db, user;

    // --- DATA CỬA HÀNG (Đồng bộ hạt mới radish, watermelon) ---
    const CROPS = {
      wheat: { id: 'wheat', name: 'Hạt Lúa Mì', icon: '🌾', seedPrice: 10, growTime: 15000, desc: 'Dễ trồng, lớn nhanh như thổi, siêu cơ bản.' },
      tomato: { id: 'tomato', name: 'Hạt Cà Chua', icon: '🍅', seedPrice: 50, growTime: 300000, desc: 'Cà chua đỏ chín mọng. Tốn 5 phút để trưởng thành.' },
      corn: { id: 'corn', name: 'Hạt Ngô Vàng', icon: '🌽', seedPrice: 200, growTime: 1800000, desc: 'Trái bắp vàng béo ngậy. Cần 30 phút để sinh trưởng hoàn toàn.' },
      radish: { id: 'radish', name: 'Hạt Củ Cải', icon: '🥕', seedPrice: 500, growTime: 3600000, desc: 'Củ cải đường thơm ngọt, giàu dinh dưỡng. Thời gian lớn là 1 giờ.' },
      strawberry: { id: 'strawberry', name: 'Hạt Dâu Tây', icon: '🍓', seedPrice: 1000, growTime: 7200000, desc: 'Trái cây hoàng gia quý giá. Đòi hỏi 2 giờ chăm sóc kiên nhẫn.' },
      watermelon: { id: 'watermelon', name: 'Hạt Dưa Hấu', icon: '🍉', seedPrice: 3000, growTime: 14400000, desc: 'Dưa hấu khổng lồ ngọt lịm giải nhiệt. Cần đến 4 giờ sinh trưởng.' },
    };

    const INITIAL_FARM = {
      silver: 200, 
      gold: 50,    
      seeds: { wheat: 5, tomato: 2, corn: 0, radish: 0, strawberry: 0, watermelon: 0 },
      harvested: { wheat: 0, tomato: 0, corn: 0, radish: 0, strawberry: 0, watermelon: 0 },
      plots: Array(16).fill(null).map((_, index) => ({ 
        state: 'empty', crop: null, plantTime: null, level: 1, isUnlocked: index === 0 ? true : false
      }))
    };

    let farmData = JSON.parse(JSON.stringify(INITIAL_FARM));

    // Hàm chuyển đổi mili-giây thành văn bản dễ hiểu
    function getGrowTimeText(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const hrs = Math.floor(totalSecs / 3600);
      const mins = Math.floor((totalSecs % 3600) / 60);
      const secs = totalSecs % 60;
      
      let text = "";
      if (hrs > 0) text += `${hrs} giờ `;
      if (mins > 0) text += `${mins} phút `;
      if (secs > 0 && hrs === 0) text += `${secs} giây`;
      return text.trim();
    }

    // --- RENDER SHOP ---
    function renderShop() {
      const grid = document.getElementById('shop-seeds-grid');
      let html = '';

      Object.values(CROPS).forEach(crop => {
        if (!farmData.seeds) farmData.seeds = {};
        const currentSeeds = farmData.seeds[crop.id] || 0;
        const canBuy1 = farmData.silver >= crop.seedPrice;
        const canBuy10 = farmData.silver >= (crop.seedPrice * 10);

        html += `
          <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex flex-col justify-between transition-transform duration-300 hover:shadow-md hover:-translate-y-1">
            <div>
              <!-- Hình ảnh & Tiêu đề chính -->
              <div class="flex gap-4 items-center mb-4">
                <div class="w-16 h-14 bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-100 rounded-2xl flex items-center justify-center text-3xl shadow-inner shrink-0">
                  ${crop.icon}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-1.5">
                    <h3 class="font-black text-sm sm:text-base text-gray-800 leading-tight">${crop.name}</h3>
                  </div>
                  <div class="inline-flex items-center gap-1 mt-1 bg-emerald-50 border border-emerald-100 text-emerald-800 text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm">
                    <i class="ph-fill ph-package"></i> Đang có: ${currentSeeds} túi
                  </div>
                </div>
              </div>

              <!-- Mô tả sản phẩm -->
              <p class="text-[11px] sm:text-xs text-gray-500 leading-relaxed mb-4 bg-gray-50/50 p-2.5 rounded-xl border border-gray-100/50">
                ${crop.desc}
              </p>

              <!-- Thông số sinh trưởng -->
              <div class="flex flex-wrap gap-2 mb-4">
                <span class="text-[10px] bg-sky-50 text-sky-700 px-2.5 py-1 rounded-lg font-black border border-sky-100 flex items-center gap-1">
                  🕒 Lớn: ${getGrowTimeText(crop.growTime)}
                </span>
                <span class="text-[10px] bg-yellow-50 text-yellow-700 px-2.5 py-1 rounded-lg font-black border border-yellow-100 flex items-center gap-1">
                  <i class="ph-fill ph-coin text-amber-500 text-sm"></i> Giá: ${crop.seedPrice} Bạc
                </span>
              </div>
            </div>

            <!-- Các nút mua hàng -->
            <div class="grid grid-cols-2 gap-2 mt-2">
              <button 
                onclick="buySeed('${crop.id}', 1)" 
                ${!canBuy1 ? 'disabled' : ''} 
                class="py-3 rounded-xl font-black text-xs transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm ${
                  canBuy1 
                    ? 'bg-[#e0f2fe] text-[#0369a1] hover:bg-[#bae6fd] hover:shadow-md' 
                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                }"
              >
                Mua x1
              </button>

              <button 
                onclick="buySeed('${crop.id}', 10)" 
                ${!canBuy10 ? 'disabled' : ''} 
                class="py-3 rounded-xl font-black text-xs transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm ${
                  canBuy10 
                    ? 'bg-[#f0fdf4] text-[#15803d] hover:bg-[#dcfce7] hover:shadow-md' 
                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                }"
              >
                Mua x10
              </button>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // --- LOGIC MUA HẠT GIỐNG ---
    window.buySeed = function(cropId, quantity) {
      const crop = CROPS[cropId];
      const totalCost = crop.seedPrice * quantity;

      if (farmData.silver >= totalCost) {
        farmData.silver -= totalCost;
        if (!farmData.seeds) farmData.seeds = {};
        farmData.seeds[cropId] = (farmData.seeds[cropId] || 0) + quantity;

        updateCurrencyDisplay();
        renderShop();
        saveToFirebase();
        showToast(`Đã mua thành công x${quantity} ${crop.name}!`);
      } else {
        showToast("Bạn không đủ Đồng Bạc!");
      }
    };

    // --- NẠP TIỀN TEST ---
    window.topUpSilver = function() {
      farmData.silver += 100;
      updateCurrencyDisplay();
      renderShop();
      saveToFirebase();
      showToast("Đã nạp thêm 100 Đồng Bạc!");
    };

    // --- UTILS & DATA MIGRATION HELPER ---
    function updateCurrencyDisplay() {
      // Đảm bảo không bị thiếu 2 loại hạt mới khi nâng cấp app
      if (!farmData.seeds) farmData.seeds = {};
      if (!farmData.harvested) farmData.harvested = {};
      Object.keys(CROPS).forEach(cropId => {
        if (farmData.seeds[cropId] === undefined) farmData.seeds[cropId] = 0;
        if (farmData.harvested[cropId] === undefined) farmData.harvested[cropId] = 0;
      });

      if (farmData.silver === undefined) farmData.silver = 200;
      if (farmData.gold === undefined) {
        farmData.gold = farmData.money || 50;
        delete farmData.money;
      }
      document.getElementById('silver-display').innerText = farmData.silver;
      document.getElementById('gold-display').innerText = farmData.gold;
    }

    let toastTimeout;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      toast.classList.remove('opacity-0', 'translate-y-[-15px]');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-15px]');
      }, 2500);
    }

    // --- FIREBASE SYNC ---
    async function saveToFirebase() {
      if (!user || !db) return;
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongtraiheocon';
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'farm');
      try { await setDoc(docRef, farmData); } catch(e) {}
    }

    // KHỞI ĐẦU: Vẽ ngay giao diện mặc định lên màn hình
    updateCurrencyDisplay();
    renderShop();

    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);

      const initAuth = async () => {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (e) {}
      };
      initAuth();

      onAuthStateChanged(auth, (currentUser) => {
        user = currentUser;
        if (user) {
          const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongtraiheocon';
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'farm');
          
          onSnapshot(docRef, (docSnap) => {
            const indicator = document.getElementById('cloud-indicator');
            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.plots) {
                data.plots = data.plots.map((p, i) => ({
                  ...p, 
                  level: p.level || 1,
                  isUnlocked: p.isUnlocked !== undefined ? p.isUnlocked : (i === 0 ? true : false)
                }));
              }
              farmData = data;
              if (indicator) {
                indicator.className = 'w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]';
                indicator.title = "Đã đồng bộ lên đám mây!";
              }
            } else {
              setDoc(docRef, farmData);
            }
            updateCurrencyDisplay();
            renderShop();
          }, (err) => {
            const indicator = document.getElementById('cloud-indicator');
            if (indicator) {
              indicator.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]';
              indicator.title = "Lỗi kết nối đồng bộ.";
            }
          });
        }
      });
    } catch(e) {
      console.error("Firebase err, offline mode active.");
    }

  </script>
</body>
</html>
