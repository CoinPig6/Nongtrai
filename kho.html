<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nông Trại Heo Con - Kho Nông Sản</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overflow-y: scroll;
      background-color: #ecfdf5;
      background-image: radial-gradient(#d1fae5 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="text-gray-800 font-sans pb-20 md:pb-0 min-h-screen flex flex-col">

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-gray-900/95 text-white px-5 py-2.5 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.25)] font-bold text-xs sm:text-sm flex items-center gap-2.5 border border-gray-700 opacity-0 pointer-events-none transition-all duration-300 translate-y-[-15px]">
    <i class="ph-fill ph-check-circle text-emerald-400 text-lg"></i>
    <span id="toast-msg">Thông báo</span>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-xl border-b border-gray-100 shadow-sm px-3 py-2.5 sm:px-4 sm:py-3">
    <div class="max-w-5xl mx-auto flex justify-between items-center gap-2">
      <!-- Logo -->
      <div class="flex items-center gap-1.5 text-emerald-800 font-black text-lg sm:text-2xl tracking-tight shrink-0">
        <div class="bg-gradient-to-br from-[#10b981] to-[#047857] text-white p-1 sm:p-1.5 rounded-lg shadow-sm border border-[#059669]">
          <i class="ph-fill ph-plant text-lg sm:text-xl"></i>
        </div>
        <span>Heo Con</span>
        <span id="cloud-indicator" class="w-2.5 h-2.5 rounded-full bg-gray-300 shadow-[0_0_8px_rgba(0,0,0,0.1)]" title="Đang đồng bộ..."></span>
      </div>
      
      <!-- Box Tiền Tệ -->
      <div class="flex items-center gap-2 shrink-0">
        <!-- Đồng Bạc -->
        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-full shadow-inner p-0.5 pl-2.5 pr-0.5 gap-1.5">
          <div class="flex items-center gap-1">
            <i class="ph-fill ph-coin text-gray-400 text-base sm:text-lg"></i>
            <span id="silver-display" class="text-xs sm:text-sm font-black text-gray-600">0</span>
          </div>
          <button onclick="topUpSilver()" class="bg-[#10b981] hover:bg-[#059669] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm transition-colors flex items-center gap-0.5 border border-emerald-600">
            <i class="ph-bold ph-plus"></i><span>Nạp</span>
          </button>
        </div>

        <!-- Đồng Vàng -->
        <div class="flex items-center gap-1 bg-gradient-to-r from-[#fef08a] to-[#fde047] px-2.5 py-1 rounded-full font-black text-[#854d0e] shadow-sm border border-[#facc15] text-xs sm:text-sm">
          <i class="ph-fill ph-coin text-[#ca8a04] text-base sm:text-lg animate-float"></i>
          <span id="gold-display">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="max-w-5xl mx-auto p-2 sm:p-4 md:py-8 flex flex-col md:flex-row gap-6 flex-1 w-full">
    
    <!-- Sidebar Desktop -->
    <div class="hidden md:flex flex-col gap-3 sticky top-24 h-fit w-64 shrink-0">
      <a href="index.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-plant text-2xl text-emerald-500"></i> Khu Vườn
      </a>
      <a href="cuahang.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-storefront text-2xl text-blue-500"></i> Cửa Hàng
      </a>
      <a href="kho.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-gradient-to-r from-emerald-500 to-green-500 text-white shadow-lg shadow-emerald-500/30 scale-[1.02]">
        <i class="ph-fill ph-backpack text-2xl"></i> Kho Nông Sản
      </a>
      <a href="tintuc.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-newspaper text-2xl text-indigo-500"></i> Bảng Tin
      </a>
      <div class="h-px bg-emerald-200/50 my-2"></div>
      <a href="taikhoan.html" class="flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-bold bg-white/80 text-emerald-800 hover:bg-white border border-transparent hover:border-emerald-100 shadow-sm">
        <i class="ph-fill ph-user text-2xl text-gray-500"></i> Hồ Sơ
      </a>
    </div>

    <!-- Nội dung chính -->
    <div class="w-full flex-1 flex flex-col gap-6 animate-pop">
      
      <!-- KHO NÔNG SẢN THU HOẠCH -->
      <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-100 flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3 border-b border-gray-100 pb-3">
          <div class="flex items-center gap-2">
            <i class="ph-fill ph-backpack text-2xl text-orange-500"></i>
            <div>
              <h2 class="font-black text-lg text-gray-800 leading-tight">Kho Hàng Của Bạn</h2>
              <p class="text-xs text-gray-500 mt-0.5">Bán nông sản tại đây để nhận về thật nhiều Đồng Vàng nhé!</p>
            </div>
          </div>
          <!-- Nút bán tất cả nông sản -->
          <button onclick="sellAllCrops()" id="btn-sell-all" class="bg-orange-500 hover:bg-orange-600 active:scale-95 text-white font-black text-xs px-4 py-2.5 rounded-xl shadow-sm transition-all flex items-center justify-center gap-1">
            <i class="ph-bold ph-currency-circle-dollar"></i> Bán tất cả nông sản
          </button>
        </div>

        <!-- Trống kho -->
        <div id="empty-inventory" class="hidden text-center py-12 flex flex-col items-center justify-center gap-2">
          <div class="w-16 h-16 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center text-3xl">
            <i class="ph ph-toolbox"></i>
          </div>
          <p class="font-bold text-gray-400 text-sm">Kho nông sản trống trơn!</p>
          <p class="text-xs text-gray-400">Hãy gieo hạt ở Khu Vườn và thu hoạch để có hàng nhé.</p>
          <a href="index.html" class="mt-3 bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xs px-5 py-2.5 rounded-xl shadow-sm transition-all">
            Đến Khu Vườn Gieo Hạt
          </a>
        </div>

        <!-- Danh sách nông sản -->
        <div id="crops-inventory-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- JS Render -->
        </div>
      </div>

    </div>
  </main>

  <!-- Bottom Nav Mobile -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-around items-end pb-safe z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] px-1 pt-1.5">
    <a href="index.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-emerald-500 transition-all">
      <i class="ph-fill ph-plant text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Vườn</span>
    </a>
    <a href="cuahang.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-blue-500 transition-all">
      <i class="ph-fill ph-storefront text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Cửa Hàng</span>
    </a>
    <a href="kho.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-emerald-600 transition-all">
      <div class="absolute inset-0 bg-emerald-50 rounded-xl -z-10 scale-95"></div>
      <i class="ph-fill ph-backpack text-2xl mb-0.5 -translate-y-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Kho</span>
    </a>
    <a href="tintuc.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-indigo-500 transition-all">
      <i class="ph-fill ph-newspaper text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Tin Tức</span>
    </a>
    <a href="taikhoan.html" class="relative flex flex-col items-center justify-center w-full py-2 mb-1 rounded-xl text-gray-400 hover:text-gray-700 transition-all">
      <i class="ph-fill ph-user text-2xl mb-0.5"></i>
      <span class="text-[9px] font-black tracking-wide">Hồ Sơ</span>
    </a>
  </nav>

  <!-- === LOGIC & FIREBASE === -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQa6awFxFTOrRXPnda8rS6vlKLKPDMJT0",
      authDomain: "nongtraiheocon.firebaseapp.com",
      databaseURL: "https://nongtraiheocon-default-rtdb.firebaseio.com",
      projectId: "nongtraiheocon",
      storageBucket: "nongtraiheocon.firebasestorage.app",
      messagingSenderId: "964519162656",
      appId: "1:964519162656:web:27247ed6287dfc74ef5d45",
      measurementId: "G-RT8HPTJERF"
    };

    let app, auth, db, user;

    // --- DATA GAME ---
    const CROPS = {
      wheat: { id: 'wheat', name: 'Lúa mì', icon: '🌾', sellPrice: 15 },
      tomato: { id: 'tomato', name: 'Cà chua', icon: '🍅', sellPrice: 80 },
      corn: { id: 'corn', name: 'Ngô', icon: '🌽', sellPrice: 350 },
      radish: { id: 'radish', name: 'Củ cải', icon: '🥕', sellPrice: 900 },
      strawberry: { id: 'strawberry', name: 'Dâu tây', icon: '🍓', sellPrice: 2000 },
      watermelon: { id: 'watermelon', name: 'Dưa hấu', icon: '🍉', sellPrice: 6500 },
    };

    const INITIAL_FARM = {
      silver: 200, 
      gold: 50,    
      seeds: { wheat: 5, tomato: 2, corn: 0, radish: 0, strawberry: 0, watermelon: 0 },
      harvested: { wheat: 0, tomato: 0, corn: 0, radish: 0, strawberry: 0, watermelon: 0 },
      plots: Array(16).fill(null).map((_, index) => ({ 
        state: 'empty', crop: null, plantTime: null, level: 1, isUnlocked: index === 0 ? true : false
      }))
    };

    let farmData = JSON.parse(JSON.stringify(INITIAL_FARM));

    // --- RENDER INVENTORY ---
    function renderInventory() {
      const grid = document.getElementById('crops-inventory-grid');
      const emptyDiv = document.getElementById('empty-inventory');
      const btnSellAll = document.getElementById('btn-sell-all');
      
      let html = '';
      let hasAnyHarvested = false;

      Object.values(CROPS).forEach(crop => {
        if (!farmData.harvested) farmData.harvested = {};
        const count = farmData.harvested[crop.id] || 0;
        
        if (count > 0) {
          hasAnyHarvested = true;
          const canSell10 = count >= 10;
          
          html += `
            <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 flex flex-col justify-between hover:border-orange-200 hover:shadow-sm transition-all duration-300">
              <div class="flex justify-between items-start mb-3">
                <div class="flex gap-3 items-center">
                  <div class="w-14 h-14 bg-white border border-gray-100 rounded-xl flex items-center justify-center text-3xl shadow-inner shrink-0">
                    ${crop.icon}
                  </div>
                  <div>
                    <h3 class="font-black text-sm text-gray-800">${crop.name}</h3>
                    <p class="text-xs text-orange-500 font-bold mt-1">Đang có: x${count}</p>
                  </div>
                </div>
                
                <div class="text-right">
                  <span class="text-[10px] text-gray-400 font-bold">Giá bán:</span>
                  <div class="text-sm font-black text-amber-600 flex items-center justify-end gap-0.5">
                    +${crop.sellPrice} <i class="ph-fill ph-coin text-yellow-500"></i>
                  </div>
                </div>
              </div>

              <!-- Nút bán -->
              <div class="grid grid-cols-2 gap-2 pt-1.5">
                <button onclick="sellCrop('${crop.id}', 1)" class="bg-white hover:bg-orange-50 text-orange-600 border border-orange-200 py-2.5 rounded-xl text-xs font-black transition-all active:scale-95 shadow-sm">
                  Bán x1
                </button>
                <button onclick="sellCrop('${crop.id}', 10)" ${!canSell10 ? 'disabled' : ''} class="bg-orange-50 hover:bg-orange-100 text-orange-700 py-2.5 rounded-xl text-xs font-black transition-all active:scale-95 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                  Bán x10
                </button>
              </div>
            </div>
          `;
        }
      });

      if (hasAnyHarvested) {
        grid.innerHTML = html;
        grid.classList.remove('hidden');
        emptyDiv.classList.add('hidden');
        btnSellAll.classList.remove('hidden');
      } else {
        grid.classList.add('hidden');
        emptyDiv.classList.remove('hidden');
        btnSellAll.classList.add('hidden');
      }
    }

    // --- LOGIC BÁN NÔNG SẢN ---
    window.sellCrop = function(cropId, quantity) {
      const crop = CROPS[cropId];
      const count = farmData.harvested[cropId] || 0;

      if (count >= quantity) {
        farmData.harvested[cropId] -= quantity;
        farmData.gold += crop.sellPrice * quantity;

        updateCurrencyDisplay();
        renderInventory();
        saveToFirebase();
        showToast(`Đã bán x${quantity} ${crop.name} thu về +${crop.sellPrice * quantity} Đồng Vàng!`);
      }
    };

    window.sellAllCrops = function() {
      let totalEarned = 0;
      let countSold = 0;

      Object.keys(CROPS).forEach(cropId => {
        const count = farmData.harvested[cropId] || 0;
        if (count > 0) {
          totalEarned += count * CROPS[cropId].sellPrice;
          countSold += count;
          farmData.harvested[cropId] = 0;
        }
      });

      if (countSold > 0) {
        farmData.gold += totalEarned;
        updateCurrencyDisplay();
        renderInventory();
        saveToFirebase();
        showToast(`Bán sạch kho nông sản! Thu về +${totalEarned} Đồng Vàng!`);
      } else {
        showToast("Kho của bạn không có nông sản nào để bán!");
      }
    };

    // --- NẠP TIỀN TEST ---
    window.topUpSilver = function() {
      farmData.silver += 100;
      updateCurrencyDisplay();
      saveToFirebase();
      showToast("Đã nạp thêm 100 Đồng Bạc!");
    };

    // --- UTILS & DATA MIGRATION HELPER ---
    function updateCurrencyDisplay() {
      if (!farmData.seeds) farmData.seeds = {};
      if (!farmData.harvested) farmData.harvested = {};

      Object.keys(CROPS).forEach(cropId => {
        if (farmData.seeds[cropId] === undefined) farmData.seeds[cropId] = 0;
        if (farmData.harvested[cropId] === undefined) farmData.harvested[cropId] = 0;
      });

      if (farmData.silver === undefined) farmData.silver = 200;
      if (farmData.gold === undefined) {
        farmData.gold = farmData.money || 50;
        delete farmData.money;
      }
      document.getElementById('silver-display').innerText = farmData.silver;
      document.getElementById('gold-display').innerText = farmData.gold;
    }

    let toastTimeout;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      toast.classList.remove('opacity-0', 'translate-y-[-15px]');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-15px]');
      }, 2500);
    }

    // --- FIREBASE SYNC ---
    async function saveToFirebase() {
      if (!user || !db) return;
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongtraiheocon';
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'farm');
      try { await setDoc(docRef, farmData); } catch(e) {}
    }

    // Khởi tạo đồ hoạ cơ bản ngay lập tức
    updateCurrencyDisplay();
    renderInventory();

    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);

      const initAuth = async () => {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (e) {}
      };
      initAuth();

      onAuthStateChanged(auth, (currentUser) => {
        user = currentUser;
        if (user) {
          const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongtraiheocon';
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'farm');
          
          onSnapshot(docRef, (docSnap) => {
            const indicator = document.getElementById('cloud-indicator');
            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.plots) {
                data.plots = data.plots.map((p, i) => ({
                  ...p, 
                  level: p.level || 1,
                  isUnlocked: p.isUnlocked !== undefined ? p.isUnlocked : (i === 0 ? true : false)
                }));
              }
              farmData = data;
              if (indicator) {
                indicator.className = 'w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]';
                indicator.title = "Đã đồng bộ lên đám mây!";
              }
            } else {
              setDoc(docRef, farmData);
            }
            updateCurrencyDisplay();
            renderInventory();
          }, (err) => {
            const indicator = document.getElementById('cloud-indicator');
            if (indicator) {
              indicator.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]';
              indicator.title = "Lỗi kết nối đồng bộ.";
            }
          });
        }
      });
    } catch(e) {
      console.error("Firebase err, offline mode active.");
    }

  </script>
</body>
</html>
